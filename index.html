<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Madrid Style - Football Hub</title>
    <style>
        :root { --bg: #000; --card: #171717; --text: #fff; --grey: #aaa; --blue: #1a73e8; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        
        /* ഗൂഗിൾ സ്റ്റൈൽ ടാബുകൾ */
        .tabs { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0; border-bottom: 1px solid #333; margin-bottom: 15px; }
        .tab-btn { background: #303134; color: var(--text); border: 1px solid #5f6368; padding: 8px 18px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 14px; }
        .tab-btn.active { background: #e8f0fe; color: #1967d2; border: 1px solid #8ab4f8; }

        .content-section { display: none; }
        .content-section.active { display: block; }

        /* മാച്ച് കാർഡ് */
        .match-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .match-row { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; }
        .team-box { display: flex; align-items: center; gap: 10px; font-weight: 500; }
        .team-logo { width: 24px; height: 24px; background: #333; border-radius: 50%; object-fit: cover; }
        .score { font-weight: bold; font-size: 18px; }
        .match-status { font-size: 12px; color: var(--grey); margin-bottom: 5px; }

        /* ടേബിൾ സ്റ്റൈൽ */
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
        th { background: #202124; color: var(--grey); text-align: left; padding: 12px; font-size: 12px; }
        td { padding: 12px; border-top: 1px solid #333; font-size: 14px; }
        .win-dot { color: #34a853; font-size: 18px; }
        .loss-dot { color: #ea4335; font-size: 18px; }

        /* അഡ്മിൻ പാനൽ */
        #adminPanel { display: none; background: #202124; padding: 20px; border-radius: 15px; margin-top: 20px; border-top: 4px solid var(--blue); }
        input, select { width: 100%; padding: 10px; margin: 8px 0; background: #303134; border: 1px solid #5f6368; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-blue { background: var(--blue); color: white; }
    </style>
</head>
<body>

    <!-- ഹെഡർ -->
    <div style="padding: 10px 0;">
        <h2 id="dispTeamTitle" style="margin: 0;">Real Madrid</h2>
        <div style="color: var(--grey); font-size: 14px; margin-top: 4px;">2nd in La Liga</div>
    </div>

    <!-- ടാബുകൾ -->
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'overview')">Overview</button>
        <button class="tab-btn" onclick="openTab(event, 'matches')">Matches</button>
        <button class="tab-btn" onclick="openTab(event, 'table')">Table</button>
        <button class="tab-btn" onclick="openTab(event, 'players')">Players</button>
    </div>

    <!-- OVERVIEW SECTION -->
    <div id="overview" class="content-section active">
        <div class="match-card">
            <div class="match-status">UEFA Champions League • Yesterday</div>
            <div class="match-row">
                <div class="team-box"><img id="ovHomeLogo" src="" class="team-logo"> <span id="ovHomeName">Real Madrid</span></div>
                <div class="score" id="ovHomeScore">3</div>
            </div>
            <div class="match-row">
                <div class="team-box"><img id="ovAwayLogo" src="" class="team-logo"> <span id="ovAwayName">Man City</span></div>
                <div class="score" id="ovAwayScore">0</div>
            </div>
        </div>
        <div id="dispTimer" style="text-align: center; color: #00ff00; font-family: monospace; font-size: 20px;">00:00</div>
    </div>

    <!-- MATCHES SECTION -->
    <div id="matches" class="content-section">
        <div class="match-card" id="matchList">
            <div style="color: var(--grey); font-size: 12px; margin-bottom: 10px;">UPCOMING MATCHES</div>
            <div class="match-row">
                <div class="team-box">Real Madrid vs Elche</div>
                <div style="font-size: 12px; text-align: right;">Sun, 15 Mar<br>1:30 am</div>
            </div>
        </div>
    </div>

    <!-- TABLE SECTION -->
    <div id="table" class="content-section">
        <table>
            <thead><tr><th>POS</th><th>TEAM</th><th>P</th><th>W</th><th>D</th><th>L</th><th>PTS</th></tr></thead>
            <tbody id="leagueTableBody">
                <tr><td>1</td><td>Barcelona</td><td>27</td><td>20</td><td>4</td><td>3</td><td>64</td></tr>
                <tr style="background: #2a2b2e;"><td>2</td><td id="tabTeamName">Real Madrid</td><td>27</td><td>19</td><td>5</td><td>3</td><td>62</td></tr>
            </tbody>
        </table>
    </div>

    <!-- PLAYERS SECTION -->
    <div id="players" class="content-section">
        <div id="playerGrid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <!-- കളിക്കാർ ഇവിടെ വരും -->
        </div>
    </div>

    <!-- അഡ്മിൻ ലോഗിൻ -->
    <center><button onclick="checkPass()" style="background:none; border:none; color:#222; font-size: 10px; margin-top: 50px;">Admin Access</button></center>

    <!-- അഡ്മിൻ പാനൽ -->
    <div id="adminPanel">
        <h3 style="color: var(--blue);">⚙️ Admin Dashboard</h3>
        
        <label>Update Live Match:</label>
        <input type="text" id="inHName" placeholder="Home Team">
        <input type="text" id="inAName" placeholder="Away Team">
        <div style="display: flex; gap: 10px;">
            <input type="number" id="inHScore" placeholder="Home Score">
            <input type="number" id="inAScore" placeholder="Away Score">
        </div>
        <button class="btn btn-blue" onclick="updateLive()">Update Live Score</button>
        
        <hr style="border: 0.5px solid #444; margin: 20px 0;">
        
        <label>Add Player:</label>
        <input type="text" id="inPName" placeholder="Player Name">
        <input type="file" id="inPPhoto">
        <button class="btn btn-blue" onclick="addPlayer()">Add Player</button>

        <button class="btn" style="background:#444; color:white;" onclick="location.reload()">Logout</button>
    </div>

    <script>
        function openTab(evt, sectionName) {
            let i, content, tablinks;
            content = document.getElementsByClassName("content-section");
            for (i = 0; i < content.length; i++) content[i].className = content[i].className.replace(" active", "");
            tablinks = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tablinks.length; i++) tablinks[i].className = tablinks[i].className.replace(" active", "");
            document.getElementById(sectionName).className += " active";
            evt.currentTarget.className += " active";
        }

        function checkPass() {
            if(prompt("Password:") === "1234") {
                document.getElementById('adminPanel').style.display = 'block';
                window.scrollTo(0, document.body.scrollHeight);
            }
        }

        function updateLive() {
            document.getElementById('ovHomeName').innerText = document.getElementById('inHName').value;
            document.getElementById('ovAwayName').innerText = document.getElementById('inAName').value;
            document.getElementById('ovHomeScore').innerText = document.getElementById('inHScore').value;
            document.getElementById('ovAwayScore').innerText = document.getElementById('inAScore').value;
            alert("Updated!");
        }

        function addPlayer() {
            let name = document.getElementById('inPName').value;
            let file = document.getElementById('inPPhoto').files[0];
            if(name && file) {
                let reader = new FileReader();
                reader.onload = function(e) {
                    let div = document.createElement('div');
                    div.className = 'match-card';
                    div.style.textAlign = 'center';
                    div.innerHTML = `<img src="${e.target.result}" style="width:60px; height:60px; border-radius:50%; object-fit:cover;"><br><b>${name}</b>`;
                    document.getElementById('playerGrid').appendChild(div);
                };
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
